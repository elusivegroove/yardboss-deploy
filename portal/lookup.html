<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reservation — YardBoss</title>
  <link rel="stylesheet" href="css/portal.css">
  <link rel="icon" type="image/png" href="/images/transvega-logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>!function(){var t=localStorage.getItem("yb-theme");t&&"light"!==t&&document.documentElement.setAttribute("data-theme",t)}();</script>
</head>
<body>
<nav class="portal-nav">
  <a href="index.html" class="nav-logo">
    <img src="/images/transvega-logo.png" class="nav-logo-icon" alt="TransVega RV and Truck Center">
    <span class="nav-logo-text">YardBoss</span>
  </a>
  <div class="nav-links">
    <a href="index.html#lots" class="nav-link">Locations</a>
    <a href="lookup.html" class="nav-link active">My Reservation</a>
    <a href="book.html" class="btn-nav"><i class="fas fa-plus"></i> Book Now</a>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="text-center mb-6">
      <h2 class="section-title">Find Your Reservation</h2>
      <p class="section-sub">Enter your email address to view your active bookings</p>
    </div>

    <div class="lookup-card">
      <div class="form-group" style="margin-bottom:14px;">
        <label>Email Address</label>
        <input type="email" id="lookupEmail" placeholder="you@company.com" style="width:100%;">
      </div>
      <button class="btn-submit" onclick="doLookup()">
        <i class="fas fa-search"></i> Find Reservations
      </button>

      <div class="lookup-results hidden" id="lookupResults"></div>
    </div>

    <!-- Detail panel (shows after clicking a result) -->
    <div class="confirm-wrapper" style="margin-top:32px; display:none" id="detailWrapper">
      <div class="confirm-card" id="detailCard">
        <div id="detailContent"></div>
        <div class="confirm-actions" style="margin-top:20px;">
          <button class="btn-outline" style="color:var(--navy); border-color:var(--gray-300);" onclick="document.getElementById('detailWrapper').style.display='none'">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <a href="profile.html" id="profileLinkBtn" class="btn-outline" style="color:var(--navy); border-color:var(--gray-300);"><i class="fas fa-id-card"></i> Update My Profile</a>
          <a href="book.html" class="btn-primary"><i class="fas fa-plus"></i> Book Another Space</a>
        </div>
      </div>
    </div>

  </div>
</section>

<footer class="portal-footer">
  <div class="footer-logo"><img src="/images/transvega-logo.png" alt="TransVega RV and Truck Center"> YardBoss</div>
  <p>Need help? Call <a href="tel:+18636003626">(863) 600-3626</a></p>
  <p style="margin-top: 8px; font-size: 0.72rem;"><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a></p>
</footer>

<div class="toast" id="toast"></div>

<script src="js/portal.js"></script>
<script>
async function doLookup() {
  const email = document.getElementById('lookupEmail').value.trim();
  if (!email) { showToast('Please enter your email address.', 'error'); return; }

  const btn = event.target;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Searching...';

  try {
    const res = await fetch(`/api/portal/lookup?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    renderLookupResults(data, email);
  } catch(e) {
    showToast('Could not connect to server. Is it running?', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-search"></i> Find Reservations';
  }
}

function renderLookupResults(items, email) {
  const el = document.getElementById('lookupResults');
  el.classList.remove('hidden');
  if (!items.length) {
    el.innerHTML = `<div style="text-align:center; padding:24px; color:var(--gray-400);">
      <i class="fas fa-search" style="font-size:1.5rem; margin-bottom:8px; display:block;"></i>
      No reservations found for <strong>${email}</strong>.
      <br><a href="book.html" style="color:var(--teal); font-weight:600; text-decoration:none;">Book a space →</a>
    </div>`;
    return;
  }

  const statusColors = { active: '#16a34a', pending: '#b45309', past: '#6b7280' };
  el.innerHTML = `<p style="font-size:0.85rem; color:var(--gray-500); margin-bottom:12px;">${items.length} reservation(s) found for <strong>${email}</strong></p>` +
    items.map(r => `
      <div class="lookup-result-item" onclick="showDetail('${r.id}')">
        <div>
          <div style="font-weight:600; color:var(--navy); font-size:0.9rem;">${r.lotName} — Space${(r.spaceNumbers&&r.spaceNumbers.length>1)?'s':''} ${(r.spaceNumbers&&r.spaceNumbers.length?r.spaceNumbers:[r.spaceNumber]).join(', ')}</div>
          <div style="font-size:0.78rem; color:var(--gray-500); margin-top:2px;">${r.lotCity} · ${r.spaceType} · $${r.monthlyRate}/mo</div>
          <div style="font-size:0.78rem; color:var(--gray-500);">${formatDate(r.startDate)} → ${formatDate(r.endDate)}</div>
        </div>
        <span style="background:${r.status==='active'?'#dcfce7':r.status==='pending'?'#fef3c7':'#f1f5f9'};
          color:${statusColors[r.status]||'#64748b'};
          padding:4px 10px; border-radius:99px; font-size:0.72rem; font-weight:600; white-space:nowrap;">
          ${r.status.charAt(0).toUpperCase()+r.status.slice(1)}
        </span>
      </div>
    `).join('');

  // Cache results for showDetail
  window._lookupResults = items;
}

async function showDetail(id) {
  let r = (window._lookupResults || []).find(x => x.id === id);
  if (!r) {
    try {
      const res = await fetch(`/api/portal/reservation/${id}`);
      r = await res.json();
    } catch(e) { return; }
  }

  document.getElementById('detailWrapper').style.display = 'block';
  document.getElementById('profileLinkBtn').href = `profile.html?t=${r.id}`;
  document.getElementById('detailContent').innerHTML = `
    <div class="confirm-icon"><i class="fas fa-warehouse"></i></div>
    <h2>${r.lotName || r.lotId}</h2>
    <p class="confirm-sub" style="margin-bottom:20px;">${r.lotAddress || ''}</p>
    <div class="confirm-ref">
      <div class="confirm-ref-label">Booking Reference</div>
      <div class="confirm-ref-id">${r.id.toUpperCase()}</div>
    </div>
    <div class="confirm-details">
      <div class="confirm-details-row"><span class="label">Tenant</span><span class="value">${r.tenantName}</span></div>
      <div class="confirm-details-row"><span class="label">Space${(r.spaceNumbers&&r.spaceNumbers.length>1)?'s':''} #</span><span class="value">${(r.spaceNumbers&&r.spaceNumbers.length?r.spaceNumbers:[r.spaceNumber]).join(', ')}</span></div>
      <div class="confirm-details-row"><span class="label">Space Type</span><span class="value">${r.spaceType}</span></div>
      <div class="confirm-details-row"><span class="label">Start Date</span><span class="value">${formatDate(r.startDate)}</span></div>
      <div class="confirm-details-row"><span class="label">End Date</span><span class="value">${formatDate(r.endDate)}</span></div>
      <div class="confirm-details-row"><span class="label">Monthly Rate</span><span class="value">$${r.monthlyRate}/month</span></div>
      <div class="confirm-details-row"><span class="label">Status</span><span class="value">${r.status}</span></div>
      <div class="confirm-details-row"><span class="label">Vehicle</span><span class="value">${r.vehicleYear||''} ${r.vehicleMake} ${r.vehicleModel}</span></div>
      <div class="confirm-details-row"><span class="label">Plate</span><span class="value">${r.vehiclePlate||'—'}</span></div>
    </div>
  `;
  document.getElementById('detailWrapper').scrollIntoView({ behavior: 'smooth' });
}

function formatDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
</script>
</body>
</html>
